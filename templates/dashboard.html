{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2 class="mb-4" style="color:white; font-weight:800;">
        Security Analytics Dashboard
    </h2>

<div class="row g-3">

    <!-- Total Scans -->
    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5 style="font-weight:700; color:#e2e8f0;">Total Scans</h5>
            <h2 class="counter" data-target="{{ total }}"
                style="color:#60a5fa; font-weight:900;">
                0
            </h2>
        </div>
    </div>

    <!-- Safe -->
    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5 style="font-weight:700; color:#e2e8f0;">Safe</h5>
            <h2 class="counter" data-target="{{ safe }}"
                style="color:#22c55e; font-weight:900;">
                0
            </h2>
        </div>
    </div>

    <!-- Low Risk -->
    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5 style="font-weight:700; color:#e2e8f0;">Low Risk</h5>
            <h2 class="counter" data-target="{{ low }}"
                style="color:#facc15; font-weight:900;">
                0
            </h2>
        </div>
    </div>

    <!-- Medium Risk -->
    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5 style="font-weight:700; color:#e2e8f0;">Medium Risk</h5>
            <h2 class="counter" data-target="{{ medium }}"
                style="color:#f97316; font-weight:900;">
                0
            </h2>
        </div>
    </div>

    <!-- High Risk -->
    <div class="col-md-3 mt-3">
        <div class="card p-3 text-center">
            <h5 style="font-weight:700; color:#e2e8f0;">High Risk</h5>
            <h2 class="counter" data-target="{{ high }}"
                style="color:#ef4444; font-weight:900;">
                0
            </h2>
        </div>
    </div>

</div>

<hr class="my-5">

<div class="row">

    <div class="col-md-6">
        <div class="card p-3">
            <h5 class="text-center mb-3" style="color:#ffffff; font-weight:800;">
                Risk Distribution
            </h5>

            <canvas id="riskChart"></canvas>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-3">
            <h5 class="text-center mb-3" style="color:#ffffff; font-weight:800;">
                Scan Summary
            </h5>

            <canvas id="summaryChart"></canvas>
        </div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const riskCanvas = document.getElementById("riskChart");
    const summaryCanvas = document.getElementById("summaryChart");

    new Chart(riskCanvas, {
        type: "pie",
        data: {
            labels: ["High", "Medium", "Low", "Safe"],
            datasets: [{
                data: [
                    {{ high }},
                    {{ medium }},
                    {{ low }},
                    {{ safe }}
                ],
                backgroundColor: ["#ef4444", "#f97316", "#facc15", "#22c55e"]
            }]
        }
    });

    new Chart(summaryCanvas, {
        type: "bar",
        data: {
            labels: ["High", "Medium", "Low", "Safe"],
            datasets: [{
                label: "Detections",
                data: [
                    {{ high }},
                    {{ medium }},
                    {{ low }},
                    {{ safe }}
                ]
            }]
        }
    });

});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const counters = document.querySelectorAll(".counter");

    counters.forEach(counter => {
        const updateCount = () => {

            const target = +counter.getAttribute("data-target");
            const current = +counter.innerText;

            const increment = Math.ceil(target / 30);

            if (current < target) {
                counter.innerText = current + increment;
                setTimeout(updateCount, 30);
            } else {
                counter.innerText = target;
            }
        };

        updateCount();
    });

});
</script>

{% endblock %}
