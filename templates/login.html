<!DOCTYPE html>
<html>
<head>
    <title>Access Gateway</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #0b1220;
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: #111827;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #0b1220;
            border: 1px solid #334155;
            color: white;
        }

        button {
            margin-top: 15px;
            width: 100%;
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h3>🔐 Access Gateway</h3>

    <form method="POST">

        <input type="text" name="code" placeholder="Enter Access Code" required>

        <button class="btn btn-primary">Enter</button>

    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

</div>

</body>
</html>
