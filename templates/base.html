<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SQL Injection Detection System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: #111827;
            border-bottom: 1px solid #334155;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: white !important;
        }

        .card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 35px rgba(0,0,0,0.5);
        }

        h1, h2, h3, h4, h5 {
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        textarea {
            background: #0b1220;
            color: white;
            border: 1px solid #334155;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        .btn-primary {
            background: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .risk-safe {
            color: #22c55e;
        }

        .risk-low {
            color: #facc15;
        }

        .risk-medium {
            color: #f97316;
        }

        .risk-high {
            color: #ef4444;
        }

        .container {
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .badge-box {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Custom badge for Medium Risk */
        .bg-orange {
            background-color: #f97316 !important;
            color: white !important;
        }

        .table thead th {
            color: #ffffff !important;
            font-weight: 700;
        }

        .table td {
            vertical-align: middle;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            color: #64748b;
            padding-bottom: 20px;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">

    <a class="navbar-brand" href="/">
        🛡 SQL Injection Shield
    </a>

    <div class="ms-auto">

    <a class="btn btn-outline-light btn-sm me-2" href="/">
        Scanner
    </a>

    <a class="btn btn-outline-info btn-sm me-2" href="/dashboard">
        Dashboard
    </a>

    <a class="btn btn-primary btn-sm" href="/history">
        History
    </a>

</div>

</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<div class="footer">
    CodeAlpha Internship Project • Security Simulation Tool • Hope Fanwi Bongnwi
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
